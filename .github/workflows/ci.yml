name: Build and Push Multi-Service Images

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # 6개 서비스를 리스트로 정의 (병렬 빌드)
        service: [auth, admin, board, diary, todos, study]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and Push
      uses: docker/build-push-action@v4
      with:
        context: .
        # 아까 만든 Dockerfile의 ARG SERVICE_NAME으로 전달됨
        build-args: SERVICE_NAME=${{ matrix.service }}
        push: true
        # 이미지 이름을 각각 다르게 생성 (예: 2sohyun/flask-auth)
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/flask-${{ matrix.service }}:latest
