# 1. Auth Service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask-auth
spec:
  replicas: 1
  selector:
    matchLabels:
      app: flask-auth
  template:
    metadata:
      labels:
        app: flask-auth
    spec:
      containers:
      - name: auth
        image: 2sohyun/flask-auth:latest
        ports:
        - containerPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
spec:
  selector:
    app: flask-auth
  ports:
  - port: 80
    targetPort: 5000
---
