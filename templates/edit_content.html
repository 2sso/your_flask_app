{% extends "base.html" %}

{% block title %}콘텐츠 수정{% endblock %}
{% block header_title %}✍️ 콘텐츠 수정{% endblock %}

{% block content %}
<link href="https://stackpath.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css" rel="stylesheet">
<script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/3.4.1/js/bootstrap.min.js"></script>
<link href="https://cdn.jsdelivr.net/npm/summernote@0.8.18/dist/summernote.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/summernote@0.8.18/dist/summernote.min.js"></script>

<style>
    .edit-form label { margin-bottom: 8px; font-weight: 600; }
    .edit-form input, .edit-form select { width: 100%; padding: 12px; margin-bottom: 1.5rem; border: 1px solid #ced4da; border-radius: 4px; box-sizing: border-box; font-size: 1em; }
    .note-editor.note-frame { margin-bottom: 1.5rem; }
    .form-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 1rem; }
    .form-actions button, .form-actions a { padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; text-decoration: none; color: white; font-weight: 500; }
    .btn-submit { background-color: #007bff; }
    .btn-cancel { background-color: #6c757d; }
</style>

<form class="edit-form" method="post">
    <div>
        <label for="subject_id">과목 선택:</label>
        <select id="subject_id" name="subject_id" required>
            {% for subject in subjects %}<option value="{{ subject.id }}" {% if subject.id == content.subject_id %}selected{% endif %}>{{ subject.name }}</option>{% endfor %}
        </select>
    </div>
    <div>
        <label for="content_type">콘텐츠 타입:</label>
        <select id="content_type" name="content_type" required>
            <option value="이론" {% if content.content_type == '이론' %}selected{% endif %}>이론</option>
            <option value="실습" {% if content.content_type == '실습' %}selected{% endif %}>실습</option>
        </select>
    </div>
    <div>
        <label for="title">제목:</label>
        <input type="text" id="title" name="title" value="{{ content.title }}" required>
    </div>
    <div>
        <label for="body">내용:</label>
        <textarea id="summernote" name="body" required>{{ content.body | safe }}</textarea>
    </div>
    <div class="form-actions">
        <a href="{{ url_for('manage_content') }}" class="btn-cancel">취소</a>
        <button type="submit" class="btn-submit">수정 완료</button>
    </div>
</form>

<script>
$(document).ready(function() {
    $('#summernote').summernote({ height: 300, lang: "ko-KR", callbacks: { onImageUpload: function(files) { uploadImage(files[0], this); } } });
    function uploadImage(file, editor) {
        const formData = new FormData();
        formData.append("file", file);
        fetch('/admin/upload_image', { method: 'POST', body: formData })
        .then(response => response.json())
        .then(data => {
            if (data.url) { $(editor).summernote('insertImage', data.url); }
            else { alert(data.error || '이미지 업로드 실패'); }
        })
        .catch(error => { alert('이미지 업로드 중 오류 발생'); });
    }
});
</script>
{% endblock %}
